<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grok Build Architecture Explorer</title>
    <meta
      name="description"
      content="Recursive map of crates, gateways, traits, and entry modes in Grok Build — the terminal AI coding agent."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Grok Build Architecture Explorer" />
    <meta property="og:title" content="Grok Build Architecture Explorer" />
    <meta
      property="og:description"
      content="Recursive map of crates, gateways, traits, and entry modes in Grok Build — the terminal AI coding agent."
    />
    <meta property="og:url" content="https://hassox.github.io/grok-build-explore/" />
    <meta property="og:image" content="https://hassox.github.io/grok-build-explore/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Grok Build Architecture Explorer — recursive architecture map" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Grok Build Architecture Explorer" />
    <meta
      name="twitter:description"
      content="Recursive map of crates, gateways, traits, and entry modes in Grok Build — the terminal AI coding agent."
    />
    <meta name="twitter:image" content="https://hassox.github.io/grok-build-explore/og-image.png" />
    <meta name="twitter:image:alt" content="Grok Build Architecture Explorer — recursive architecture map" />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="file-protocol-banner" role="status">
      This page is designed for <code>file://</code> (classic scripts, no modules).
      If content is blank, open the browser console for errors, or serve the folder:
      <code>python3 -m http.server 8765</code>
      then visit <code>http://127.0.0.1:8765/</code>.
    </div>
    <div id="error" role="alert"></div>
    <main id="app" class="app" aria-live="polite">
      <!-- Populated by app.js -->
      <p style="color: #8b949e; padding: 2rem">Loading architecture data…</p>
    </main>
    <!-- Classic script tags (not type=module) so file:// works without CORS issues -->
    <script src="architecture-data.js"></script>
    <script src="app.js"></script>
    <script>
      /* Show gentle file:// tip only when opened from disk (still fully functional). */
      (function () {
        if (location.protocol === "file:") {
          var b = document.getElementById("file-protocol-banner");
          if (b) b.style.display = "block";
        }
      })();
    </script>
  </body>
</html>
